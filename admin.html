<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка | Vkusnyashak City</title>
    <link rel="stylesheet" href="style.css?v=1.5">
    <style>
        #admin-content {
            display: none;
            padding: 20px;
        }
        
        .admin-box {
            max-width: 500px;
            margin: 0 auto;
            background: #111;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #ff9a8b;
        }
        
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        textarea {
            height: 80px;
            resize: none;
        }
        
        .upload-area {
            border: 2px dashed #444;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            margin: 15px 0;
            display: block;
        }
        
        #img-preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            display: none;
            margin-top: 15px;
            border-radius: 10px;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        
        .btn-delete {
            color: #ff4d4d;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        .admin-controls button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 10px;
            font-weight: bold;
        }
        
        .admin-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            margin-top: 10px;
        }
        
        .admin-filters input,
        .admin-filters select {
            margin: 0;
            font-size: 0.9rem;
        }
        
        .promo-management {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 154, 139, 0.1);
            border-radius: 12px;
        }
        
        .promo-management h4 {
            color: #ff9a8b;
            margin-bottom: 10px;
        }
        
        .promo-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .promo-buttons button {
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .promo-info {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div id="login-form" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="admin-box" style="text-align: center;">
            <h2 style="font-family: 'Marck Script', cursive; color: #ff9a8b; font-size: 2.5rem;">Админка</h2>
            <input type="password" id="admin-pass" placeholder="Пароль администратора">
            <button onclick="login()" class="btn-sm" style="margin-top: 15px; height: 50px; width: 100%;">Войти</button>
        </div>
    </div>

    <div id="admin-content"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="promo-system.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsbOVaSbdFKkxl4H3g1V5UJtYjhRN1mWs",
            authDomain: "vkusnyashka-final.firebaseapp.com",
            databaseURL: "https://vkusnyashka-final-default-rtdb.firebaseio.com",
            projectId: "vkusnyashka-final"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const imgbbKey = "68f93abb27b5ba9de658c9d854859342"; // ЗАМЕНИ НА СВОЙ КЛЮЧ!

        let editId = null;

        async function login() {
            const pass = document.getElementById('admin-pass').value;
            const adminEmail = "admin@vkusnyashak.kz";

            if (!pass) {
                alert("Введите пароль!");
                return;
            }

            try {
                await firebase.auth().signInWithEmailAndPassword(adminEmail, pass);
                document.getElementById('login-form').remove();
                const content = document.getElementById('admin-content');
                content.style.display = 'block';
                renderAdminUI(content);
                fetchList();
                loadPromoCodesList();
                console.log("Вход выполнен!");
            } catch (e) {
                console.error("Ошибка входа:", e);
                if (e.code === 'auth/user-not-found') {
                    alert("Создайте пользователя в Firebase Console: Email: admin@vkusnyashak.kz");
                } else {
                    alert("Ошибка: " + e.message);
                }
            }
        }

        function renderAdminUI(container) {
            container.innerHTML = `
                <div class="admin-box">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <a href="index.html" style="color:#ff9a8b; text-decoration: none;">← На сайт</a>
                        <button onclick="location.reload()" style="background:none; border:none; color:#666;">Выйти</button>
                    </div>
                    <h2 id="form-title" style="margin: 20px 0;">Новое изделие</h2>
                    <form id="productForm" onsubmit="saveProduct(event)">
                        <input type="text" id="p-name" placeholder="Название" required>
                        <input type="number" id="p-price" placeholder="Цена (₸)" required>
                        <textarea id="p-desc" placeholder="Описание..."></textarea>
                        <input type="text" id="p-count" placeholder="Вес/Количество (1кг, 6шт)">
                        
                        <label>Категория:</label>
                        <select id="p-cat">
                            <option value="pies">Пироги</option>
                            <option value="cakes">Торты</option>
                            <option value="sweet_pastry">сладкая выпечка</option>
                            <option value="savory_pastry">выпечка</option>
                            <option value="pastries">пирожные</option>
                            <option value="cookies">Печенье</option>
                            <option value="drinks">Напитки</option>
                            <option value="sets">Сеты</option>
                        </select>

                        <label>Тип изделия:</label>
                        <select id="p-type">
                            <option value="">Без уточнения</option>
                            <option value="chocolate">🍫 Шоколадные</option>
                            <option value="fruit">🍓 Фруктовые</option>
                            <option value="cream">🧁 С кремом</option>
                            <option value="seasonal">🎄 Сезонные</option>
                            <option value="diet">🥗 Диетические</option>
                        </select>

                        <label>Статус:</label>
                        <select id="product-badge">
                            <option value="">Без бейджа</option>
                            <option value="hit">ХИТ 🔥</option>
                            <option value="new">НОВИНКА ✨</option>
                        </select>

                        <label class="upload-area">
                            <input type="file" id="p-file" accept="image/*" style="display:none;" onchange="showPreview(this)">
                            <span id="upload-label">📸 Выбрать фото</span>
                            <img id="img-preview">
                        </label>

                        <button type="submit" id="add-btn" class="btn-sm" style="width: 100%;">Опубликовать</button>
                        <button type="button" id="cancel-edit" onclick="resetForm()" style="display:none; width: 100%; margin-top:10px; background:#333; border:none; color:white; border-radius:10px; height:40px;">Отмена</button>
                    </form>

                    <h3 style="margin-top: 40px; color:#ff9a8b; border-top: 1px solid #333; padding-top: 20px;">Список меню:</h3>
                    
                    <div class="admin-filters">
                        <input type="text" id="admin-search" placeholder="🔍 Поиск по имени..." oninput="fetchList()">
                        <select id="admin-filter-cat" onchange="fetchList()">
                            <option value="all">Все категории</option>
                            <option value="pies">Пироги</option>
                            <option value="cakes">Торты</option>
                            <option value="sweet_pastry">сладкая выпечка</option>
                            <option value="savory_pastry">выпечка</option>
                            <option value="pastries">пирожные</option>
                            <option value="cookies">Печенье</option>
                            <option value="drinks">Напитки</option>
                            <option value="sets">Сеты</option>
                        </select>
                    </div>

                    <div id="product-list"></div>
                    
                    <h3 style="margin-top: 40px; color:#ff9a8b; border-top: 1px solid #333; padding-top: 20px;">
                        Управление промокодами
                    </h3>

                    <form id="promoForm" onsubmit="savePromoCode(event)" style="margin-top: 20px;">
                        <input type="text" id="promo-code-input" placeholder="КОД ПРОМОКОДА (например: SWEET10)" required>
                        <input type="number" id="promo-value" placeholder="Значение скидки" required>
                        
                        <select id="promo-type">
                            <option value="percentage">Процентная скидка (%)</option>
                            <option value="fixed">Фиксированная скидка (₸)</option>
                        </select>
                        
                        <input type="date" id="promo-expires" placeholder="Срок действия (необязательно)">
                        
                        <button type="submit" class="btn-sm" style="width: 100%; margin-top: 10px;">
                            Добавить промокод
                        </button>
                    </form>

                    <div id="promo-list" style="margin-top: 20px;"></div>
                    
                    <div class="promo-management">
                        <h4>Управление системой промокодов</h4>
                        <div class="promo-buttons">
                            <button onclick="viewPromoStatsAdmin()" style="background: #3498db; color: white;">
                                📊 Статистика
                            </button>
                            <button onclick="resetAllPromoCodesAdmin()" style="background: #e74c3c; color: white;">
                                🔄 Сбросить все
                            </button>
                            <button onclick="testPromoSystem()" style="background: #2ecc71; color: white;">
                                🧪 Тест системы
                            </button>
                        </div>
                        <p class="promo-info">
                            * Система хранит данные в localStorage браузера
                        </p>
                    </div>
                </div>`;
        }

        function showPreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('img-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('upload-label').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveProduct(event) {
            event.preventDefault();

            if (!navigator.onLine) {
                alert("Ошибка: Интернет отсутствует!");
                return;
            }

            const btn = document.getElementById('add-btn');
            const fileInput = document.getElementById('p-file');

            if (!editId && !fileInput.files[0]) {
                alert("Выберите фото!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "⏳ Загрузка...";

            try {
                let imgUrl = null;

                // Загрузка на ImgBB
                if (fileInput.files[0]) {
                    const formData = new FormData();
                    formData.append("image", fileInput.files[0]);

                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, {
                        method: "POST",
                        body: formData
                    });

                    const resData = await res.json();
                    if (resData.success) {
                        imgUrl = resData.data.url;
                    } else {
                        throw new Error("Ошибка загрузки фото");
                    }
                }

                const productData = {
                    name: document.getElementById('p-name').value,
                    price: document.getElementById('p-price').value,
                    desc: document.getElementById('p-desc').value,
                    count: document.getElementById('p-count').value,
                    cat: document.getElementById('p-cat').value,
                    type: document.getElementById('p-type').value,
                    badge: document.getElementById('product-badge').value,
                    available: true
                };

                if (imgUrl) productData.img = imgUrl;

                const dbRef = editId ? db.ref('products/' + editId) : db.ref('products').push();
                await dbRef.set(productData);

                alert(editId ? "Обновлено успешно!" : "Изделие добавлено!");
                resetForm();
                fetchList();

            } catch (e) {
                console.error("Ошибка сохранения:", e);
                alert("Ошибка: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Опубликовать";
            }
        }

        function fetchList() {
            db.ref('products').on('value', s => {
                const container = document.getElementById('product-list');
                const searchInput = document.getElementById('admin-search');
                const filterCat = document.getElementById('admin-filter-cat');

                const data = s.val();
                if (!container) return;
                if (!data) {
                    container.innerHTML = "Пусто";
                    return;
                }

                const query = searchInput ? searchInput.value.toLowerCase() : '';
                const selectedCat = filterCat ? filterCat.value : 'all';

                const keys = Object.keys(data).reverse();
                const filteredKeys = keys.filter(id => {
                    const p = data[id];
                    const matchesSearch = p.name.toLowerCase().includes(query);
                    const matchesCat = (selectedCat === 'all') || (p.cat === selectedCat);
                    return matchesSearch && matchesCat;
                });

                if (filteredKeys.length === 0) {
                    container.innerHTML = "<p style='text-align:center; opacity:0.5; padding:20px;'>Ничего не найдено</p>";
                    return;
                }

                container.innerHTML = filteredKeys.map(id => `
                    <div class="list-item">
                        <span style="${data[id].available === false ? 'text-decoration:line-through; opacity:0.5;' : ''}">
                            ${data[id].name} (${data[id].price} ₸)
                        </span>
                        <div class="admin-controls">
                            <button style="color: #3498db;" onclick="editItem('${id}')">Ред.</button>
                            <button style="color: #f1c40f;" onclick="toggleStock('${id}', ${data[id].available !== false})">
                                ${data[id].available === false ? 'Вернуть' : 'Стоп'}
                            </button>
                            <button class="btn-delete" onclick="deleteItem('${id}')">Удалить</button>
                        </div>
                    </div>`).join('');
            });
        }

        window.editItem = function(id) {
            db.ref('products/' + id).once('value', s => {
                const p = s.val();
                editId = id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-desc').value = p.desc || '';
                document.getElementById('p-count').value = p.count || '';
                document.getElementById('p-cat').value = p.cat;
                document.getElementById('p-type').value = p.type || '';
                document.getElementById('product-badge').value = p.badge || '';

                document.getElementById('form-title').innerText = "Редактирование";
                document.getElementById('add-btn').innerText = "Сохранить изменения";
                document.getElementById('cancel-edit').style.display = "block";
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }

        window.resetForm = function() {
            editId = null;
            document.getElementById('productForm').reset();
            document.getElementById('form-title').innerText = "Новое изделие";
            document.getElementById('add-btn').innerText = "Опубликовать";
            document.getElementById('cancel-edit').style.display = "none";
            document.getElementById('img-preview').style.display = "none";
            document.getElementById('upload-label').style.display = "block";
        }

        window.toggleStock = function(id, currentStatus) {
            db.ref('products/' + id).update({
                available: !currentStatus
            });
        }

        function deleteItem(id) {
            if (confirm("Удалить это изделие?")) db.ref('products/' + id).remove();
        }

        // Функция сохранения промокода
        async function savePromoCode(event) {
            event.preventDefault();

            const code = document.getElementById('promo-code-input').value.toUpperCase();
            const value = parseInt(document.getElementById('promo-value').value);
            const type = document.getElementById('promo-type').value;
            const expires = document.getElementById('promo-expires').value || null;

            if (!code || !value) {
                alert("Заполните все обязательные поля!");
                return;
            }

            const promoData = {
                code: code,
                value: value,
                type: type,
                expires: expires,
                active: true,
                createdAt: new Date().toISOString()
            };

            try {
                await db.ref('promocodes').push().set(promoData);
                alert("Промокод добавлен!");
                document.getElementById('promoForm').reset();
                loadPromoCodesList();
            } catch (e) {
                console.error("Ошибка:", e);
                alert("Ошибка: " + e.message);
            }
        }

        // Загрузка списка промокодов
        function loadPromoCodesList() {
            db.ref('promocodes').on('value', s => {
                        const container = document.getElementById('promo-list');
                        const data = s.val();

                        if (!data) {
                            container.innerHTML = "Нет промокодов";
                            return;
                        }

                        const keys = Object.keys(data).reverse();
                        container.innerHTML = keys.map(id => {
                                    const p = data[id];
                                    const expired = p.expires && new Date(p.expires) < new Date();

                                    return `
                        <div class="list-item" style="${!p.active ? 'opacity:0.5;' : ''}">
                            <span>
                                <strong>${p.code}</strong> - 
                                ${p.type === 'percentage' ? `${p.value}%` : `${p.value} ₸`}
                                ${p.expires ? `(до ${new Date(p.expires).toLocaleDateString()})` : ''}
                                ${expired ? '⌛' : ''}
                                ${!p.active ? '❌' : ''}
                            </span>
                            <div>
                                <button style="color: #f1c40f;" 
                                        onclick="togglePromo('${id}', ${p.active})">
                                    ${p.active ? 'Деактивировать' : 'Активировать'}
                                </button>
                                <button class="btn-delete" onclick="deletePromo('${id}')">
                                    Удалить
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        function togglePromo(id, currentStatus) {
            db.ref('promocodes/' + id).update({
                active: !currentStatus
            });
        }

        function deletePromo(id) {
            if (confirm("Удалить этот промокод?")) {
                db.ref('promocodes/' + id).remove();
            }
        }

        // Функции для управления промокодами
        window.viewPromoStatsAdmin = function() {
            try {
                // Проверяем, существует ли система промокодов
                if (typeof SmartPromoSystem === 'undefined') {
                    alert("Система промокодов не загружена. Проверьте подключение smart-promo.js");
                    return;
                }

                const tempPromoSystem = new SmartPromoSystem();
                const stats = tempPromoSystem.getStats();
                
                let message = `📊 СТАТИСТИКА ПРОМОКОДОВ:\n\n`;
                message += `Всего записей: ${stats.total || 0}\n`;
                message += `В процессе: ${stats.pending || 0}\n`;
                message += `Подтверждено: ${stats.confirmed || 0}\n\n`;
                
                if (stats.byCode && Object.keys(stats.byCode).length > 0) {
                    message += `📈 ПО КОДАМ:\n`;
                    Object.keys(stats.byCode).forEach(code => {
                        const data = stats.byCode[code];
                        message += `${code}: ${data.confirmed || 0} использовано, ${data.pending || 0} в процессе\n`;
                    });
                } else {
                    message += `📈 ПО КОДАМ: нет данных\n`;
                }
                
                message += `\n🔄 ДЛЯ УПРАВЛЕНИЯ:\n`;
                message += `• В консоли: smartPromoSystem.resetPromoCode('КОД', 'ТЕЛЕФОН')\n`;
                message += `• Для сброса всех: localStorage.removeItem('smart_promo_states')\n`;
                
                alert(message);
            } catch(e) {
                console.error("Ошибка загрузки статистики:", e);
                alert("Ошибка загрузки статистики: " + e.message);
            }
        };

        window.resetAllPromoCodesAdmin = function() {
            if (confirm("❌ ВНИМАНИЕ! Это сбросит ВСЕ данные о использованных промокодах у всех клиентов. Продолжить?")) {
                try {
                    localStorage.removeItem('smart_promo_states');
                    localStorage.removeItem('used_promocodes');
                    localStorage.removeItem('pending_promos');
                    alert("✅ Все данные о промокодах сброшены!");
                } catch(e) {
                    console.error("Ошибка сброса:", e);
                    alert("Ошибка: " + e.message);
                }
            }
        };

        window.testPromoSystem = function() {
            alert(`🧪 ТЕСТ СИСТЕМЫ ПРОМОКОДОВ:

1. Одноразовые промокоды:
• VKUSNYASHKA10 - 10% скидка
• SWEET500 - 500₸ скидка
• FIRSTORDER - 15% первый заказ
• WELCOME10 - 10% приветственный

2. Многоразовые:
• DESSERT20 - 20% скидка

3. Как работает:
• Промокод → "в процессе" (pending)
• Заказ в WhatsApp → "подтвержден" (confirmed)
• Отмена заказа → сброс через 10 минут
• Данные хранятся 90 дней

4. Для сброса тестового промокода:
В консоли: smartPromoSystem.resetPromoCode('КОД', 'ТЕЛЕФОН')`);
        };
    </script>
</body>

</html>
